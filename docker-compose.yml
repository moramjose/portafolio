services:
  portafolio:
    build: .
    container_name: portafolio
    restart: unless-stopped
    networks:
      - homelab

  chatbot-api:
    build: ./chatbot-api
    container_name: chatbot-api
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - homelab

networks:
  homelab:
    name: homelab
    external: true
